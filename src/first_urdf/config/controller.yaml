controller_manager:
  ros__parameters:
    update_rate: 50
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController
  
diff_drive_controller:
  ros__parameters:
    use_stamped_vel: false
    left_wheel_names: ['wheel1_to_base', 'wheel3_to_base']
    right_wheel_names: ['wheel2_to_base', 'wheel4_to_base']

    wheel_radius: 0.2
    wheel_separation: 1.15
    wheels_per_side: 1

    base_frame_id: base_link
    odom_frame_id: odom
    publish_rate: 50.0
    cmd_vel_timeout: 1.0
    enable_odom_tf: true
    open_loop: false